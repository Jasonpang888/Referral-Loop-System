openapi: 3.1.0
info:
  title: Api
  version: 2.0.0
  description: Partner Growth Platform — Multi-Brand Referral Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: brands
  - name: platform
  - name: referral
  - name: leads
  - name: commissions
  - name: partner
  - name: analytics
  - name: campaigns
  - name: payouts
  - name: audit
  - name: exports

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated

  /brands:
    get:
      operationId: getBrands
      tags: [brands]
      summary: List all brands
      responses:
        "200":
          description: Brands list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Brand"
    post:
      operationId: createBrand
      tags: [brands]
      summary: Create a new brand
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrandInput"
      responses:
        "201":
          description: Brand created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"

  /brands/{id}:
    get:
      operationId: getBrand
      tags: [brands]
      summary: Get brand by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Brand
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
        "404":
          description: Not found
    patch:
      operationId: updateBrand
      tags: [brands]
      summary: Update brand
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrandUpdate"
      responses:
        "200":
          description: Updated brand
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"

  /platform/stats:
    get:
      operationId: getPlatformStats
      tags: [platform]
      summary: Get platform-wide statistics (super_admin)
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /platform/partners:
    get:
      operationId: getPlatformPartners
      tags: [platform]
      summary: Get all partners across all brands (super_admin)
      parameters:
        - name: brandId
          in: query
          schema:
            type: ["integer", "null"]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: All partners
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformPartnerList"

  /referral/{code}:
    get:
      operationId: getReferralPage
      tags: [referral]
      summary: Get referral landing page data
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Referral page data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralPage"
        "404":
          description: Code not found

  /leads:
    get:
      operationId: getLeads
      tags: [leads]
      summary: List leads
      parameters:
        - name: stage
          in: query
          schema:
            type: string
        - name: partnerId
          in: query
          schema:
            type: ["integer", "null"]
        - name: brandId
          in: query
          schema:
            type: ["integer", "null"]
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadList"
    post:
      operationId: createLead
      tags: [leads]
      summary: Create a new lead (customer signup)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadInput"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "409":
          description: Duplicate mobile or membership ID

  /leads/check-duplicate:
    get:
      operationId: checkDuplicate
      tags: [leads]
      summary: Check for duplicate by mobile or membership ID
      parameters:
        - name: mobile
          in: query
          schema:
            type: string
        - name: membershipId
          in: query
          schema:
            type: string
        - name: brandId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Duplicate check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicateCheck"

  /leads/{id}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Get lead by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Not found
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadUpdate"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{id}/stage:
    patch:
      operationId: updateLeadStage
      tags: [leads]
      summary: Update lead pipeline stage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StageUpdate"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{id}/verify-payment:
    post:
      operationId: verifyPayment
      tags: [leads]
      summary: Verify payment and trigger commission calculation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentVerification"
      responses:
        "200":
          description: Payment verified, commission calculated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{id}/whatsapp-message:
    get:
      operationId: getLeadWhatsappMessage
      tags: [leads]
      summary: Get WhatsApp-ready confirmation messages for lead (both languages)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: WhatsApp messages in both languages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappMessagePair"

  /commissions:
    get:
      operationId: getCommissions
      tags: [commissions]
      summary: List commissions
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: partnerId
          in: query
          schema:
            type: ["integer", "null"]
        - name: brandId
          in: query
          schema:
            type: ["integer", "null"]
        - name: unbatched
          in: query
          description: If true, only return commissions not yet assigned to a payout batch
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of commissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissionList"

  /commissions/{id}:
    get:
      operationId: getCommission
      tags: [commissions]
      summary: Get commission by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Commission details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Commission"

  /commissions/{id}/approve:
    patch:
      operationId: approveCommission
      tags: [commissions]
      summary: Approve a commission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommissionAction"
      responses:
        "200":
          description: Commission approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Commission"

  /commissions/{id}/reject:
    patch:
      operationId: rejectCommission
      tags: [commissions]
      summary: Reject a commission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommissionAction"
      responses:
        "200":
          description: Commission rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Commission"

  /commissions/{id}/pay:
    patch:
      operationId: payCommission
      tags: [commissions]
      summary: Mark commission as paid
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayoutAction"
      responses:
        "200":
          description: Commission paid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Commission"

  /commissions/{id}/dispute:
    patch:
      operationId: disputeCommission
      tags: [commissions]
      summary: Dispute a commission
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommissionAction"
      responses:
        "200":
          description: Commission disputed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Commission"

  /payout-batches:
    get:
      operationId: getPayoutBatches
      tags: [payoutBatches]
      summary: List payout batches
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of payout batches
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutBatchList"
    post:
      operationId: createPayoutBatch
      tags: [payoutBatches]
      summary: Create a payout batch from approved commissions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayoutBatchInput"
      responses:
        "201":
          description: Payout batch created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutBatch"

  /payout-batches/{id}:
    get:
      operationId: getPayoutBatch
      tags: [payoutBatches]
      summary: Get payout batch detail (with linked commissions)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payout batch detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutBatchDetail"

  /payout-batches/{id}/mark-paid:
    patch:
      operationId: markPayoutBatchPaid
      tags: [payoutBatches]
      summary: Mark a payout batch (and all its commissions) as paid
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayoutAction"
      responses:
        "200":
          description: Payout batch paid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutBatch"

  /payout-batches/{id}/cancel:
    patch:
      operationId: cancelPayoutBatch
      tags: [payoutBatches]
      summary: Cancel a draft payout batch and release its commissions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommissionAction"
      responses:
        "200":
          description: Payout batch cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutBatch"

  /payout-batches/{id}/export:
    get:
      operationId: exportPayoutBatch
      tags: [payoutBatches]
      summary: Export a payout batch's commissions as CSV
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: CSV export metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResult"

  /partner/leads:
    get:
      operationId: getPartnerLeads
      tags: [partner]
      summary: Get leads for the authenticated partner
      parameters:
        - name: stage
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Partner's leads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadList"

  /partner/commissions:
    get:
      operationId: getPartnerCommissions
      tags: [partner]
      summary: Get commissions for the authenticated partner
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Partner's commissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissionList"

  /partner/stats:
    get:
      operationId: getPartnerStats
      tags: [partner]
      summary: Get partner monthly performance stats
      parameters:
        - name: month
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Partner stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerStats"

  /partner/statement:
    get:
      operationId: getPartnerStatement
      tags: [partner]
      summary: Get partner statement for a month
      parameters:
        - name: month
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Statement data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerStatement"

  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Get analytics summary (leads, bookings, conversions, costs)
      parameters:
        - name: campaignId
          in: query
          schema:
            type: ["integer", "null"]
        - name: brandId
          in: query
          schema:
            type: ["integer", "null"]
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /analytics/monthly-trend:
    get:
      operationId: getMonthlyTrend
      tags: [analytics]
      summary: Get monthly trend data
      parameters:
        - name: months
          in: query
          schema:
            type: integer
        - name: brandId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Monthly trend
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyTrendItem"

  /analytics/pipeline:
    get:
      operationId: getPipelineBreakdown
      tags: [analytics]
      summary: Get pipeline stage breakdown
      parameters:
        - name: brandId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Pipeline breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PipelineStageCount"

  /campaigns:
    get:
      operationId: getCampaigns
      tags: [campaigns]
      summary: List campaigns
      parameters:
        - name: brandId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      summary: Get campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    patch:
      operationId: updateCampaign
      tags: [campaigns]
      summary: Update campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignUpdate"
      responses:
        "200":
          description: Updated campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /partners:
    get:
      operationId: getPartners
      tags: [partner]
      summary: List partners (admin/staff — brand-scoped)
      parameters:
        - name: brandId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Partners list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PartnerProfile"
    post:
      operationId: createPartner
      tags: [partner]
      summary: Create a partner account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerInput"
      responses:
        "201":
          description: Partner created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerProfile"

  /partners/{id}:
    get:
      operationId: getPartner
      tags: [partner]
      summary: Get partner profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Partner profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerProfile"

  /audit-log:
    get:
      operationId: getAuditLog
      tags: [audit]
      summary: Get immutable audit log
      parameters:
        - name: entityType
          in: query
          schema:
            type: string
        - name: entityId
          in: query
          schema:
            type: ["integer", "null"]
        - name: brandId
          in: query
          schema:
            type: ["integer", "null"]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogList"

  /exports/leads:
    get:
      operationId: exportLeads
      tags: [exports]
      summary: Export leads as CSV
      parameters:
        - name: stage
          in: query
          schema:
            type: string
        - name: brandId
          in: query
          schema:
            type: ["integer", "null"]
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: CSV export metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResult"

  /exports/commissions:
    get:
      operationId: exportCommissions
      tags: [exports]
      summary: Export commissions as CSV
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: brandId
          in: query
          schema:
            type: ["integer", "null"]
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: CSV export metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthResult:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, username, role, displayName]
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [super_admin, brand_admin, brand_staff, partner, admin, zhengji_staff, kiri_partner]
        displayName:
          type: string
        brandId:
          type: ["integer", "null"]
        partnerId:
          type: ["integer", "null"]

    Brand:
      type: object
      required: [id, name, primaryColor, accentColor, isActive, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        nameZh:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        primaryColor:
          type: string
        accentColor:
          type: string
        industry:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string

    BrandInput:
      type: object
      required: [name, primaryColor, accentColor]
      properties:
        name:
          type: string
        nameZh:
          type: string
        description:
          type: string
        logoUrl:
          type: string
        primaryColor:
